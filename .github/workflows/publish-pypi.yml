name: Publish Runtime to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      approve_prerelease_dependencies:
        description: Explicitly allow prerelease spec-kitty-* dependency pins for this run
        required: false
        default: false
        type: boolean
      approve_direct_reference_dependencies:
        description: Explicitly allow direct URL spec-kitty-* dependencies for this run
        required: false
        default: false
        type: boolean

jobs:
  acceptance:
    uses: ./.github/workflows/acceptance.yml
    with:
      approve_prerelease_dependencies: ${{ inputs.approve_prerelease_dependencies || false }}
      approve_direct_reference_dependencies: ${{ inputs.approve_direct_reference_dependencies || false }}
    secrets: inherit

  validate-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches pyproject version
        run: |
          python - <<'PY'
          import os
          import tomllib

          ref_name = os.environ["GITHUB_REF_NAME"]
          tag_version = ref_name[1:] if ref_name.startswith("v") else ref_name

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          project_version = data["project"]["version"]
          if tag_version != project_version:
              raise SystemExit(
                  f"Tag/version mismatch: tag={tag_version}, pyproject={project_version}"
              )
          print(f"Tag/version validated: {tag_version}")
          PY

  publish:
    name: Publish package to PyPI
    needs: [acceptance, validate-tag]
    if: always() && needs.acceptance.result == 'success' && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
