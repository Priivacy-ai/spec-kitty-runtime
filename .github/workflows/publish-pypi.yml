name: Publish Runtime to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      approve_prerelease_dependencies:
        description: Explicitly allow prerelease spec-kitty-* dependency pins for this run
        required: false
        default: false
        type: boolean
      approve_direct_reference_dependencies:
        description: Explicitly allow direct URL spec-kitty-* dependencies for this run
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os
          import tomllib

          ref_name = os.environ["GITHUB_REF_NAME"]
          tag_version = ref_name[1:] if ref_name.startswith("v") else ref_name

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          project_version = data["project"]["version"]
          if tag_version != project_version:
              raise SystemExit(
                  f"Tag/version mismatch: tag={tag_version}, pyproject={project_version}"
              )
          print(f"Tag/version validated: {tag_version}")
          PY

      - name: Install test and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine pytest
          python -m pip install -e .[test]

      - name: Run tests
        run: pytest -q

      - name: Validate dependency compatibility matrix
        run: python scripts/release/validate_dependency_matrix.py

      - name: Validate dependency policy
        env:
          INPUT_ALLOW_PRERELEASE: ${{ github.event.inputs.approve_prerelease_dependencies }}
          INPUT_ALLOW_DIRECT_REF: ${{ github.event.inputs.approve_direct_reference_dependencies }}
          SECRET_ALLOW_PRERELEASE: ${{ secrets.RELEASE_APPROVE_PRERELEASE_DEPS }}
          SECRET_ALLOW_DIRECT_REF: ${{ secrets.RELEASE_APPROVE_DIRECT_REFERENCE_DEPS }}
        run: |
          set -euo pipefail
          POLICY_ARGS=()

          if [[ "${INPUT_ALLOW_PRERELEASE}" == "true" || "${SECRET_ALLOW_PRERELEASE}" == "1" ]]; then
            POLICY_ARGS+=(--allow-prerelease)
          fi

          if [[ "${INPUT_ALLOW_DIRECT_REF}" == "true" || "${SECRET_ALLOW_DIRECT_REF}" == "1" ]]; then
            POLICY_ARGS+=(--allow-direct-reference)
          fi

          python scripts/release/validate_dependency_policy.py "${POLICY_ARGS[@]}"

      - name: Build distribution artifacts
        run: |
          python -m build
          twine check dist/*

      - name: Validate distribution metadata
        run: python scripts/release/validate_distribution_metadata.py --package spec-kitty-runtime

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish package to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
