name: Publish Runtime to TestPyPI

on:
  workflow_dispatch:
    inputs:
      approve_prerelease_dependencies:
        description: Explicitly allow prerelease spec-kitty-* dependency pins for this run
        required: false
        default: false
        type: boolean
      approve_direct_reference_dependencies:
        description: Explicitly allow direct URL spec-kitty-* dependencies for this run
        required: false
        default: false
        type: boolean

jobs:
  acceptance:
    uses: ./.github/workflows/acceptance.yml
    with:
      approve_prerelease_dependencies: ${{ inputs.approve_prerelease_dependencies || false }}
      approve_direct_reference_dependencies: ${{ inputs.approve_direct_reference_dependencies || false }}
    secrets: inherit

  publish:
    name: Publish package to TestPyPI
    needs: acceptance
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
